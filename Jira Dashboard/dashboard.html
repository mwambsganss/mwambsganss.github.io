<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Executive Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // Re-map module imports to globals provided by the CDN scripts
    const { useState, useMemo, useCallback, useEffect } = React;
  </script>

  <script type="text/babel" data-presets="react">
    /* ---- shim the named imports the JSX file uses ---- */
    const { useState, useMemo, useCallback, useEffect } = React;

    /* ============================================================
       INLINE: jira-executive-dashboard.jsx (verbatim, minus the
       `import` line and `export default` keyword — those are
       handled by the shim above and the ReactDOM.createRoot call
       below).
    ============================================================ */
  </script>

  <!-- Load the JSX component source, stripping the ES-module import/export -->
  <script type="text/babel" data-presets="react" id="dashScript"></script>

  <script>
    // Fetch the JSX file, strip the import/export lines, inject into Babel script tag, then mount
    fetch("jira-executive-dashboard.jsx")
      .then(r => r.text())
      .then(src => {
        // Remove ES module import line
        src = src.replace(/^import\s+.*from\s+["']react["'];?\s*\n?/m, "");
        // Change `export default function Dashboard` → `function Dashboard`
        src = src.replace(/export\s+default\s+function\s+Dashboard/, "function Dashboard");
        // Append ReactDOM mount
        src += `\n\nconst __root = ReactDOM.createRoot(document.getElementById("root"));\n__root.render(React.createElement(Dashboard));\n`;

        const script = document.getElementById("dashScript");
        script.textContent = src;

        // Tell Babel standalone to transform and execute it
        Babel.transformScriptTags();
      })
      .catch(err => {
        document.getElementById("root").innerHTML =
          `<div style="color:#f87171;padding:40px;font-family:monospace">
            Failed to load dashboard: ${err.message}<br/><br/>
            Make sure you are serving this folder over HTTP (not file://).<br/>
            Run: <code>python3 -m http.server 8080</code> in the Jira Dashboard folder.
           </div>`;
      });
  </script>
</body>
</html>
