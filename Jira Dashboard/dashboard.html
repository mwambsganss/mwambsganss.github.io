<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Executive Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #root { min-height: 100vh; }
    #loading { display:flex; align-items:center; justify-content:center; height:100vh; color:#64748b; font-size:14px; }
  </style>
</head>
<body>
  <div id="root"><div id="loading">Loading dashboard…</div></div>

  <script>
    // ── Auth token: fetch from server (SSO session or keychain fallback) ──────
    async function fetchAndStoreToken() {
      try {
        const r = await fetch("/api/auth-token");
        const data = await r.json();
        if (!r.ok) {
          // Server returned a login_url when SSO is configured — redirect there
          if (data.login_url) { window.location.href = data.login_url; return; }
          return;
        }
        const { token, expires_at, email, llm_key, llm_url } = data;
        // SSO token (returned as llm_key from server) is the user's personal Azure AD token.
        // The LLM gateway accepts it because the user's account has the required group access.
        // Always refresh on page load so an expired token gets replaced.
        if (llm_key) {
          localStorage.setItem("jiraDash_claudeKey", llm_key);
          if (llm_url) localStorage.setItem("jiraDash_claudeUrl", llm_url);
          if (!localStorage.getItem("jiraDash_claudeModel"))
            localStorage.setItem("jiraDash_claudeModel", "sonnet-latest");
        } else if (token) {
          // Fallback: use SSO token directly if llm_key wasn't returned
          localStorage.setItem("jiraDash_claudeKey", token);
          localStorage.setItem("jiraDash_claudeUrl", "https://lilly-code-server.api.gateway.llm.lilly.com");
          if (!localStorage.getItem("jiraDash_claudeModel"))
            localStorage.setItem("jiraDash_claudeModel", "sonnet-latest");
        }
        if (email) localStorage.setItem("jiraDash_email", email);
      } catch (e) {
        console.warn("Auth token fetch failed:", e);
      }
    }

    // Auto-load token on page load
    fetchAndStoreToken();

    // ── Load and run the JSX dashboard ───────────────────────────────────────
    fetch("jira-executive-dashboard.jsx")
      .then(r => r.text())
      .then(src => {
        src = src.replace(/^import\s+\{[^}]+\}\s+from\s+['"]react['"];?\s*\n?/m, "");
        src = src.replace(/export\s+default\s+function\s+Dashboard/, "function Dashboard");
        src = `const { useState, useMemo, useCallback, useEffect } = React;\n` + src +
              `\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Dashboard));\n`;
        const compiled = Babel.transform(src, { presets: ["react"] }).code;
        eval(compiled); // eslint-disable-line no-eval
      })
      .catch(err => {
        function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
        document.getElementById("root").innerHTML =
          `<div style="color:#f87171;padding:40px;font-family:monospace;line-height:1.8">
            <strong>Failed to load dashboard</strong><br/><br/>
            ${esc(err.message)}<br/><br/>
            Make sure you are serving this folder via server.py:<br/>
            <code style="background:#1e293b;padding:4px 8px;border-radius:4px">
              python3 server.py
            </code><br/>
            then open <a href="http://localhost:8080/dashboard.html" style="color:#60a5fa">
              http://localhost:8080/dashboard.html
            </a>
          </div>`;
      });
  </script>
</body>
</html>
