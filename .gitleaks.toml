# GitLeaks Configuration for Secret Scanning
# This file configures gitleaks to scan for secrets in the repository

title = "gitleaks config for mwambsganss.github.io"

# Azure AD Secrets
[[rules]]
id = "azure-client-secret"
description = "Azure AD Client Secret"
regex = '''[A-Za-z0-9_~\-\.]{3,20}Q~[A-Za-z0-9_~\-]{20,}'''
tags = ["azure", "secret"]

# Generic API Keys
[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey)['":\s]*[=:]\s*['"][A-Za-z0-9_\-]{20,}['"]'''
tags = ["api", "key"]

# AWS Access Keys
[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["aws", "key"]

# Bearer Tokens
[[rules]]
id = "bearer-token"
description = "Bearer Token"
regex = '''(?i)bearer\s+[A-Za-z0-9_\-\.]{20,}'''
tags = ["token", "bearer"]

# Private Keys
[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'''
tags = ["private", "key"]

# GitHub Personal Access Tokens
[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''ghp_[A-Za-z0-9]{36}'''
tags = ["github", "token"]

# Generic Passwords
[[rules]]
id = "password-assignment"
description = "Password in assignment"
regex = '''(?i)(password|passwd|pwd)['":\s]*[=:]\s*['"][^'"]{8,}['"]'''
tags = ["password"]

# Allowlist for test files and documentation
[allowlist]
paths = [
  '''Web Crawler/Tester/fixtures/.*''',
  '''.*\.md$''',
  '''.*_test\.py$''',
  '''.*test_.*\.py$'''
]

regexes = [
  '''YOUR_TOKEN''',
  '''YOUR_API_KEY''',
  '''REDACTED''',
  '''FAKE''',
  '''example\.com''',
  '''placeholder'''
]
