name: Jira Dashboard — Build & Push Image

on:
  pull_request:
    paths:
      - 'Jira Dashboard/**'
      - 'secrets_loader.py'
      - 'llm_gateway.py'
  push:
    branches: [master]
    paths:
      - 'Jira Dashboard/**'
      - 'secrets_loader.py'
      - 'llm_gateway.py'
    tags: ['v*']

env:
  IMAGE_NAME: jira-dashboard

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=prod-sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/master ]]; then
            echo "tag=qa-sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to ECR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.LIGHT_DOCKER_REPOSITORY_URL }}
          username: ${{ secrets.LIGHT_DOCKER_USER }}
          password: ${{ secrets.LIGHT_DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Jira Dashboard/Dockerfile
          push: true
          provenance: false
          tags: ${{ secrets.LIGHT_DOCKER_REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
